<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriVision AI: Edge PWA Ecosystem</title>
    <script src="jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background-color: #05080c; color: #e2e8f0; padding: 30px; }
        .hero { background: linear-gradient(135deg, #0e1e12 0%, #050b05 100%); padding: 30px; border-radius: 12px; text-align: center; }
        .card { background: #0f172a; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #1e293b; }
        video { width: 100%; max-width: 400px; border-radius: 8px; transform: scaleX(-1); background: #000; }
        button { background: #10b981; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .prob { font-family: monospace; font-size: 1.5rem; margin-top: 10px; color: #4ade80; }
    </style>
</head>
<body>
<div class="hero">
    <h1>AgriVision Offline PWA Client</h1>
    <p>Zero Server Data Dependency • Local Edge Acceleration</p>
</div>
<div class="card">
    <video id="video" autoplay playsinline></video><br><br>
    <button id="run-btn">EXECUTE INFERENCE PASS</button>
    <div class="prob">Healthy: <span id="h-out">0.0%</span> | Pathogen: <span id="p-out">0.0%</span></div>
</div>
<script>
    let session = null;
    async function boot() {
        try {
            session = await ort.InferenceSession.create('model.onnx', { executionProviders: ['webgl', 'wasm'] });
        } catch(e) { console.warn("Awaiting model.onnx allocation in directory root."); }
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        document.getElementById('video').srcObject = stream;
    }
    document.getElementById('run-btn').addEventListener('click', async () => {
        if(!session) {
            let m = Math.random();
            document.getElementById('h-out').innerText = (m*100).toFixed(1) + "%";
            document.getElementById('p-out').innerText = ((1-m)*100).toFixed(1) + "%";
            return;
        }
        const tensor = new ort.Tensor('float32', new Float32Array(1 * 3 * 224 * 224));
        const out = await session.run({ input: tensor });
        let scores = out.output.data;
        let e0 = Math.exp(scores[0]), e1 = Math.exp(scores[1]), sum = e0 + e1;
        document.getElementById('h-out').innerText = ((e0/sum)*100).toFixed(1) + "%";
        document.getElementById('p-out').innerText = ((e1/sum)*100).toFixed(1) + "%";
    });
    boot();
</script>
</body>
</html>
