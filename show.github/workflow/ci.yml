name: Model Pipeline CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Integration Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Tree
      uses: actions/checkout@v4

    - name: Initialize Enterprise Python Runtime Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Bootstrap Core System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision numpy

    - name: Execute System Graph Unit Tests
      run: |
        python -c "
        import torch
        import numpy as np
        from model import AgriVisionNet

        print('🚀 Phase 1: Checking Input Geometry Boundaries...')
        img_array = np.random.randn(1, 3, 64, 64).astype(np.float32)
        tensor = torch.tensor(img_array)
        assert tensor.shape == torch.Size(), 'CRITICAL: Ingestion pipeline failure.'
        
        print('🚀 Phase 2: Running Graph Integration Unit Tests...')
        model = AgriVisionNet(use_optimization=True)
        model.eval()
        
        with torch.no_grad():
            output_logits = model(tensor)
            
        assert output_logits.shape == torch.Size(), 'CRITICAL: Network boundary structural divergence.'
        print('✅ MLOps Verification Passed: Continuous integration checks successful.')
        "

